name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
    
    - name: Lint with ruff
      run: |
        ruff check src/
    
    - name: Type check with mypy
      run: |
        mypy src/futurex_benchmark/
    
    - name: Test with pytest
      run: |
        pytest tests/ -v --cov=futurex_benchmark --cov-report=xml
    
    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        fail_ci_if_error: false

  validate-questions:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install package
      run: |
        python -m pip install --upgrade pip
        pip install -e .
    
    - name: Validate V2 questions
      run: |
        futurex-benchmark validate \
          --questions src/futurex_benchmark/references/benchmark_questions_v2_enhanced.json
    
    - name: Check JSON syntax
      run: |
        python -c "
import json
with open('src/futurex_benchmark/references/benchmark_questions_v2_enhanced.json') as f:
    data = json.load(f)
    print(f'✅ Valid JSON with {len(data[\"questions\"])} questions')
        "
